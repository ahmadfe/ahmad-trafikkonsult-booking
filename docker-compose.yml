version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ahmad_trafikkonsult
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: password
      DB_NAME: ahmad_trafikkonsult
      JWT_SECRET: your_jwt_secret
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "8080:3000"
    depends_on:
      - backend

volumes:
  postgres_data: